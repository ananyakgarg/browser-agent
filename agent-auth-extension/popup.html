<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status .count {
      font-size: 24px;
      font-weight: 700;
      color: #0066cc;
    }
    .status .label {
      color: #666;
      font-size: 12px;
    }
    .domains {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .domain-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
    }
    .domain-row .name { color: #333; }
    .domain-row .count { color: #999; font-variant-numeric: tabular-nums; }
    .filter-section {
      margin-bottom: 12px;
    }
    .filter-section label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    .filter-section input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0052a3; }
    button:disabled { background: #ccc; cursor: default; }
    .result {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .result.success { background: #e6f7e6; color: #1a7a1a; display: block; }
    .result.error { background: #fde8e8; color: #b91c1c; display: block; }
    .actions {
      display: flex;
      gap: 8px;
    }
    .actions button { flex: 1; }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover { background: #e0e0e0; }
    .auto-export {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #0066cc; }
    .toggle input:checked + .slider::before { transform: translateX(16px); }
    .path-info {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Agent Auth</h1>

  <div class="status">
    <div class="count" id="cookieCount">&mdash;</div>
    <div class="label">cookies across <span id="domainCount">&mdash;</span> domains</div>
  </div>

  <div class="domains" id="domainList"></div>

  <div class="filter-section">
    <label>Filter domains (comma-separated, leave blank for all)</label>
    <input type="text" id="domainFilter" placeholder="github.com, jira.atlassian.com">
  </div>

  <div class="actions">
    <button id="exportBtn">Export to File</button>
    <button id="copyBtn" class="btn-secondary">Copy JSON</button>
  </div>

  <div class="path-info">
    Exports to ~/Downloads/agent-auth-state.json<br>
    Move to ~/.agent-auth/state.json for auto-discovery
  </div>

  <div class="auto-export">
    <span>Auto-export every 15 min</span>
    <label class="toggle">
      <input type="checkbox" id="autoExportToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="result" id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
